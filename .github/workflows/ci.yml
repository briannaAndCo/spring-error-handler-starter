name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 17, 21 ]
        spring-boot-version: [ '3.3.8', '3.4.4' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Build with Spring Boot ${{ matrix.spring-boot-version }}
        run: mvn -B verify -Dspring-boot.version=${{ matrix.spring-boot-version }}
